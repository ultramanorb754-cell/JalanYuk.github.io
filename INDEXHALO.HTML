<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

<body>
    <!-- <h1 id="text" class="textClass">halo dunia</h1> -->
    <!-- <button onclick="alert('Jack The Prince')">Klik saya</button> -->
   <button id="custom">Custom Event</button>
    <p id="desc">Text Belum Berubah</p>
    <script>
// =========== custom event ============
    const changeText = new Event('customEvent');

    document.addEventListener('customEvent', function(e){
        document.getElementById('desc').textContent = 'Text Sudah Dirubah';
        document.getElementById('desc').style.color = 'green';
    })

    document.getElementById('custom').addEventListener('click', function(e){
        document.dispatchEvent(changeText);
    })

    </script>
</body>
