<div id="popupSukses" class="popup-sukses">
  <div class="popup-box">

    <div class="icon">✔</div>

    <h2>Pesanan Berhasil!</h2>
    <p>Pesanan kamu telah kami terima.</p>

    <div class="detail">
      <div class="item">
        <span>Destinasi</span>
        <b id="destUser"></b>
      </div>

      <div class="item">
        <span>Total</span>
        <b id="totalUser"></b>
      </div>

      <div class="item">
        <span>Tanggal</span>
        <b id="tanggalUser"></b>
      </div>
    </div>

    <div class="id-box">
      ID Transaksi: <b id="idUser"></b>
    </div>

    <button onclick="tutupSukses()">Selesai</button>

  </div>
</div>

<script>
function kirimPesan(e){
  e.preventDefault();

  // ambil data
  const destinasi = document.getElementById("destinasiPesan");
  const destText = destinasi.options[destinasi.selectedIndex].text;

  const total = document.getElementById("totalHarga").innerText;

  // tanggal sekarang
  const now = new Date();
  const tanggal = now.toLocaleDateString("id-ID");

  // ID random
  const id = "TRX" + Math.floor(Math.random()*1000000000);

  // isi popup
  document.getElementById("destUser").innerText = destText;
  document.getElementById("totalUser").innerText = total;
  document.getElementById("tanggalUser").innerText = tanggal;
  document.getElementById("idUser").innerText = id;

  // tampilkan
  document.getElementById("popupSukses").style.display = "flex";
}

function tutupSukses(){
  document.getElementById("popupSukses").style.display = "none";
}
</script>
