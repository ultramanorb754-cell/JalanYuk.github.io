<html lang="en">
<head>
</head>
<body>

<p>TO DO LIST</p>

<input type="text" id="inputToDo" placeholder="Masukkan Kegiatan">
<button onclick="store()">Tambah</button>
<button onclick="load()">Muat Data</button>
<button onclick="destroy()">Hapus</button>

<ul id="todoItems">
    <!-- innerHtml -->
</ul>

<script>
    let to_dos = [];

    function store() {
        let getTodo_item = document.getElementById('inputToDo').value
        if(getTodo_item != ''){
            document.getElementById('todoItems').innerHTML += `<li>${getTodo_item}</li>`;
            const to_do = {
                name: getTodo_item,
            }
            to_dos.push(to_do)
            localStorage.setItem('to_dos', JSON.stringify(to_dos));
        }
    }

    function load() {
        let saved_to_dos = localStorage.getItem('to_dos');
        let parsed_to_dos = JSON.parse(saved_to_dos);
        parsed_to_dos.forEach((todo) => {
        document.getElementById('todoItems').innerHTML += `<li>${todo.name}</li>`;
    });
}

    function destroy() {
        localStorage.clear()
        window.alert('Data Dihapus!');
}
</script>

</body>
</html>
