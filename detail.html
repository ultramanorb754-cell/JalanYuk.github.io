<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Destinasi</title>

<style>
body{
  font-family: 'Poppins', sans-serif;
  margin:0;
  background:#f4f4f4;
}

.container{
  max-width:900px;
  margin:100px auto;
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.container img{
  width:100%;
  height:400px;
  object-fit:cover;
}

.content{
  padding:30px;
}

h1{
  margin-bottom:10px;
}

.harga{
  color:#00bcd4;
  font-weight:bold;
  margin:10px 0;
}

.back{
  display:inline-block;
  margin-top:20px;
  padding:10px 20px;
  background:#00bcd4;
  color:white;
  text-decoration:none;
  border-radius:10px;
}
</style>

</head>
<body>

<div class="container">
  <img id="gambar" src="" alt="">
  
  <div class="content">
    <h1 id="judul"></h1>
    <p id="deskripsi"></p>
    <p class="harga" id="harga"></p>

    <a href="index.html" class="back">Kembali</a>
  </div>
</div>

<script>
const data = {
  japan:{
    judul:"Japan",
    gambar:"japan.png",
    deskripsi:"Nikmati Tokyo, Gunung Fuji, Kyoto, dan budaya Jepang.",
    harga:"Rp 25.000.000"
  },
  swiss:{
    judul:"Swiss",
    gambar:"swiss.png",
    deskripsi:"Pegunungan Alpen dan danau indah.",
    harga:"Rp 35.000.000"
  },
  indonesia:{
    judul:"Indonesia",
    gambar:"bali.png",
    deskripsi:"Pantai Kuta, Ubud, dan Tanah Lot.",
    harga:"Rp 15.000.000"
  }
};

// ambil parameter URL
const url = new URLSearchParams(window.location.search);
const negara = url.get("negara");

// isi data ke halaman
if(data[negara]){
  document.getElementById("judul").innerText = data[negara].judul;
  document.getElementById("deskripsi").innerText = data[negara].deskripsi;
  document.getElementById("harga").innerText = data[negara].harga;
  document.getElementById("gambar").src = data[negara].gambar;
}
</script>

</body>
</html>
