<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Keren</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #2c5364, #6a11cb);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.login-box {
    width: 400px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);

    box-shadow:
        0 0 20px rgba(255,255,255,0.1),
        0 0 60px rgba(0,0,0,0.4);

    animation: fadeUp 0.8s ease;
}

/* ANIMASI */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h2 {
    text-align: center;
    margin-bottom: 5px;
}

.sub {
    text-align: center;
    font-size: 13px;
    color: #ccc;
    margin-bottom: 25px;
}

.form-group {
    margin-bottom: 15px;
}

label {
    font-size: 14px;
}

/* INPUT */
.input-box {
    position: relative;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.15);
    color: white;
    outline: none;
}

input::placeholder {
    color: #ddd;
}

/* ICON */
.icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
}

.eye {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
}

/* CHECK */
.row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin: 10px 0;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #4facfe, #a64bf4);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* LOGIN SOSIAL */
.social {
    text-align: center;
    margin-top: 20px;
}

.icons {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 10px;
}

.icons div {
    width: 45px;
    height: 45px;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(255,255,255,0.2);
}

/* ERROR */
.error {
    margin-top: 15px;
    background: rgba(255,0,0,0.2);
    padding: 10px;
    border-radius: 10px;
    display: none;
    text-align: center;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Selamat Datang Di Luarin Aja</h2>
       <div class="sub">Login untuk melanjutkan</div>

    <form onsubmit="return login()">

        <div class="form-group">
            <label>Username</label>
            <div class="input-box">
                <input type="text" id="user" placeholder="Masukkan username" required>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-box">
                <input type="password" id="pass" placeholder="Masukkan password" required>
                <span class="eye" onclick="togglePass()">👁️</span>
            </div>
        </div>

        <div class="row">
            <div><input type="checkbox"> Ingat saya</div>
            <div>Lupa password?</div>
        </div>

        <button type="submit">Masuk →</button>

        <div class="error" id="error">
            Login gagal! Username atau password salah
        </div>

        <div class="social">
            <div>Atau login dengan</div>
            <div class="icons">
                <div>G</div>
                <div>🐱</div>
            </div>
        </div>

    </form>
</div>

<script>
function togglePass() {
    let pass = document.getElementById("pass");
    pass.type = pass.type === "password" ? "text" : "password";
}

function login() {
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(user === "Jack" && pass === "2324") {
        alert("Login berhasil!");
        return true;
    } else {
        document.getElementById("error").style.display = "block";
        return false;
    }
}
</script>

</body>
</html>
