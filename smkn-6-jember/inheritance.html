<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>

em.dua {
    color: red;
}

em.dua:hover {
    color: blue;
}

</style>

</head>

<body>

<div class="satu">
    <p class="satu">
        Kalimat ini tanpa <em class="satu">nilai properti inherit</em> CSS
    </p>
</div>

<br>

<div class="dua">
    <p class="dua">
        Kalimat ini menggunakan <em class="dua">nilai properti inherit</em> CSS
    </p>
</div>

</body>
</html>
