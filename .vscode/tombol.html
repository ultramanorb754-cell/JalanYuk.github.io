<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganti Warna Latar</title>
    
    <style>
        /* CSS: Mengatur tampilan agar sama persis seperti gambar */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s ease; /* Efek transisi warna halus */
            /* Warna latar belakang awal (ungu seperti di gambar Anda) */
            background-color: #5E4CC6; 
        }

        .card {
            text-align: center;
            background: rgb(0, 0, 0);
            padding: 40px 30px; /* Padding disesuaikan */
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); /* Bayangan yang lebih lembut */
            width: 300px; /* Menjaga lebar kartu tetap rapi */
        }

        h1 {
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 30px; /* Jarak ke tombol */
            font-size: 2rem;
            font-weight: 700;
        }

        /* Teks kode warna sudah dihapus dari CSS */

        button {
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            /* Warna tombol abu-abu tua seperti di gambar */
            background-color: #4A4A4A; 
            color: white;
            border: none;
            border-radius: 10px;
            transition: all 0.2s;
            width: 100%; /* Tombol memenuhi lebar kartu */
        }

        button:hover {
            background-color: #333; /* Sedikit lebih gelap saat di-hover */
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(0.97); /* Efek tekan */
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Warna Saat Ini:</h1>
        <button id="change-btn">Klik Untuk Ganti Warna</button>
    </div>

    <script>
        // JavaScript: Logika perubahan warna yang diperbarui
        const button = document.getElementById('change-btn');
        // Tidak lagi membutuhkan referensi ke teks kode warna

        // Fungsi menghasilkan warna HEX acak
        function generateRandomColor() {
            const chars = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += chars[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        // Jalankan perintah saat tombol diklik
        button.addEventListener('click', function() {
            const newColor = generateRandomColor();
            
            // HANYA mengubah latar belakang body
            document.body.style.backgroundColor = newColor;
            
            // Perubahan teks kode warna dihapus
        });
    </script>

</body>
</html>
